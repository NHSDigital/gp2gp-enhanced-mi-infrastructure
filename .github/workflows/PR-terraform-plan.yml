name: "PR-terraform-plan"
on:
  pull_request:
    branches:
      - main
    paths:
      - '../../stacks/container_repositories/**'
      - '../../stacks/base_networking/**'
      - '../../stacks/ecs_cluster/**'
      - '.github/workflows/PR-terraform-plan.yml'

permissions:
  pull-requests: write
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  terraform_plan:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        environment: [ dev, prod-plan ]
        terraform_stack:
          - name: "base_networking"
            hyphenated_alias: base-networking
          - name: "container_repositories"
            hyphenated_alias: container-repositories
          - name: "ecs_cluster"
            hyphenated_alias: ecs-cluster
    uses: ./.github/workflows/base-terraform-plan-and-apply.yml
    with:
      environment: ${{ matrix.environment }}
      terraform_stack: ${{ matrix.terraform_stack }}
    secrets: inherit


