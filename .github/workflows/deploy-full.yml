name: Deploy - Full

run-name: "${{ if(github.event_name == 'push', 'push', format('{0} | {1}', inputs.environment, if(inputs.is_deployment, 'Apply', 'Plan'))) }}"

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        type: choice
        default: "dev"
        description: "Which environment this action should run against?"
        required: true
        options:
          - dev
          - prod
      is_deployment:
        type: boolean
        default: false
        description: "Does the workflow run Terraform Apply?"

permissions:
  pull-requests: write
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  deploy_base_infrastructure:
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        terraform_stack:
          - name: "base_networking"
            hyphenated_alias: base-networking
          - name: "container_repositories"
            hyphenated_alias: container-repositories
          - name: "ecs_cluster"
            hyphenated_alias: ecs-cluster
    uses: ./.github/workflows/base-terraform-plan-and-apply.yml
    with:
      environment: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}
      terraform_stack: ${{ matrix.terraform_stack.name }}
      hyphenated_alias: ${{ matrix.terraform_stack.hyphenated_alias }}
      is_deployment: ${{ github.event_name == 'push' && true || inputs.is_deployment }}
    secrets: inherit

  deploy_degrades:
    needs: [deploy_base_infrastructure]
    uses: ./.github/workflows/base-degrades-reporting.yml
    with:
      environment: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}
      is_deployment: ${{ github.event_name == 'push' && true || inputs.is_deployment }}
    secrets: inherit

  deploy-gp-registrations-mi:
    needs: [deploy_degrades]
    uses: ./.github/workflows/base-gp-registrations-mi.yml
    with:
      environment: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}
      is_deployment: ${{ github.event_name == 'push' && true || inputs.is_deployment }}
    secrets: inherit
