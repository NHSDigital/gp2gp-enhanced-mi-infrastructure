name: "Z-AUTOMATED: Deploy - GP Registrations MI"

on:
  pull_request:
    branches:
      - main
    paths:
      - "../../stacks/gp_registrations_mi/**"
      - ".github/workflows/automated-deploy-gp-registrations-mi.yml"

permissions:
  pull-requests: write
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  terraform_plan:
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod-plan]
    uses: ./.github/workflows/base-gp-registrations-mi.yml
    with:
      environment: ${{ matrix.environment }}
    secrets: inherit
